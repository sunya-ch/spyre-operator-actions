name: Pre-commit Check

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.13'
      goprivate:
        description: 'GOPRIVATE environment variable for private Go modules'
        required: false
        type: string
        default: ''
    secrets:
      gh-token:
        description: 'GitHub token for accessing private repositories (PAT with repo scope)'
        required: false

permissions: read-all

env:
  GOTOOLCHAIN: auto

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Configure Git for private repos
      env:
        GH_TOKEN: ${{ secrets.gh-token || secrets.GITHUB_TOKEN }}
      run: |
        git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
    
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
    
    - name: Set GOPRIVATE
      if: ${{ inputs.goprivate != '' }}
      run: |
         echo "GOPRIVATE=${{ inputs.goprivate }}" >> $GITHUB_ENV

    - name: Run vendor
      run: go mod vendor
    
    - uses: pre-commit/action@v3.0.1
