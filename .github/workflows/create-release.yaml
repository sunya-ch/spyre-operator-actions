name: Create Release

on:
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create release as draft'
        required: false
        type: boolean
        default: false
      prerelease:
        description: 'Mark release as prerelease'
        required: false
        type: boolean
        default: false
      generate_release_notes:
        description: 'Automatically generate release notes'
        required: false
        type: boolean
        default: true
      tag_prefix:
        description: 'Prefix for the git tag (e.g., "v" for v1.0.0)'
        required: false
        type: string
        default: 'v'
  workflow_call:
    inputs:
      draft:
        description: 'Create release as draft'
        required: false
        type: boolean
        default: false
      prerelease:
        description: 'Mark release as prerelease'
        required: false
        type: boolean
        default: false
      generate_release_notes:
        description: 'Automatically generate release notes'
        required: false
        type: boolean
        default: true
      tag_prefix:
        description: 'Prefix for the git tag (e.g., "v" for v1.0.0)'
        required: false
        type: string
        default: 'v'
    secrets:
      gh-token:
        description: 'GitHub token for creating releases (defaults to GITHUB_TOKEN)'
        required: false

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ secrets.gh-token || secrets.GITHUB_TOKEN }}

    - name: Get version from VERSION file
      id: get_version
      run: |
        if [ ! -f VERSION ]; then
          echo "ERROR: VERSION file not found"
          exit 1
        fi
        VERSION=$(cat VERSION)
        if [ -z "$VERSION" ]; then
          echo "ERROR: VERSION file is empty"
          exit 1
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "tag=${{ inputs.tag_prefix }}${VERSION}" >> $GITHUB_OUTPUT
        echo "Version: ${VERSION}"
        echo "Tag: ${{ inputs.tag_prefix }}${VERSION}"

    - name: Check if tag already exists
      id: check_tag
      run: |
        TAG="${{ steps.get_version.outputs.tag }}"
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "WARNING: Tag $TAG already exists"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Tag $TAG does not exist yet"
        fi

    - name: Create and push tag
      if: steps.check_tag.outputs.exists == 'false'
      env:
        GH_TOKEN: ${{ secrets.gh-token || secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.get_version.outputs.tag }}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "$TAG" -m "Release $TAG"
        git push origin "$TAG"
        echo "Created and pushed tag: $TAG"

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.gh-token || secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.get_version.outputs.tag }}"
        VERSION="${{ steps.get_version.outputs.version }}"
        
        RELEASE_ARGS="--title \"Release $TAG\""
        
        if [ "${{ inputs.draft }}" = "true" ]; then
          RELEASE_ARGS="$RELEASE_ARGS --draft"
        fi
        
        if [ "${{ inputs.prerelease }}" = "true" ]; then
          RELEASE_ARGS="$RELEASE_ARGS --prerelease"
        fi
        
        if [ "${{ inputs.generate_release_notes }}" = "true" ]; then
          RELEASE_ARGS="$RELEASE_ARGS --generate-notes"
        else
          RELEASE_ARGS="$RELEASE_ARGS --notes \"Release version $VERSION\""
        fi
        
        eval gh release create "$TAG" $RELEASE_ARGS
        echo "Created release: $TAG"

    - name: Summary
      run: |
        echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ steps.get_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Tag**: ${{ steps.get_version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Draft**: ${{ inputs.draft }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Prerelease**: ${{ inputs.prerelease }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Auto-generated Notes**: ${{ inputs.generate_release_notes }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.check_tag.outputs.exists }}" = "true" ]; then
          echo "⚠️ Tag already existed, only created release" >> $GITHUB_STEP_SUMMARY
        else
          echo "✅ Created new tag and release" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🔗 [View Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.get_version.outputs.tag }})" >> $GITHUB_STEP_SUMMARY
