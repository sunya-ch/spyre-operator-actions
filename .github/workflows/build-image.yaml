name: Build Image

on:
  workflow_call:
    inputs:
      runner:
        description: 'GitHub runner to use for building the image'
        required: false
        type: string
        default: 'ubuntu-latest'
      pre_build_command:
        description: "Optional command to run before docker build"
        required: false
        type: string
        default: ""
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "./Dockerfile"
      image_suffix:
        description: 'Suffix to append to IMAGE_TAG (e.g., -dev)'
        required: false
        type: string
        default: '-dev'
      registry:
        description: 'Container registry to push to (e.g., ghcr.io, docker.io)'
        required: false
        type: string
        default: 'ghcr.io/ibm-aiu'
      image_name:
        description: 'Name of the image'
        required: false
        type: string
        default: ''
    secrets:
      registry-username:
        description: 'Container registry username (not needed for ghcr.io with GITHUB_TOKEN)'
        required: false
      registry-password:
        description: 'Container registry password or token (not needed for ghcr.io with GITHUB_TOKEN)'
        required: false
permissions:
  contents: read
  packages: write  # Crucial for pushing to ghcr.io

jobs:
  metadata:
    runs-on: ${{ inputs.runner }}
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      image_tag: ${{ steps.get_version.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Get version from VERSION file
        id: get_version
        run: |
          if [ ! -f VERSION ]; then
            echo "ERROR: VERSION file not found"
            exit 1
          fi

          VERSION=$(cat VERSION)
          if [ -z "$VERSION" ]; then
            echo "ERROR: VERSION file is empty"
            exit 1
          fi

          # Append -dev only if not already present
          if [[ "$VERSION" == *"${{ inputs.image_suffix }}" ]]; then
            IMAGE_TAG="$VERSION"
          else
            IMAGE_TAG="${VERSION}${{ inputs.image_suffix }}"
          fi
          
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"
          echo "Image tag: ${IMAGE_TAG}"

  build-image:
    needs: metadata
    strategy:
      fail-fast: false

      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ${{ inputs.runner }}
          - arch: s390x
            platform: linux/s390x
            runner:
              - self-hosted
              - Linux
              - S390X
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Debug metadata outputs
      run: |
        echo "VERSION=${{ needs.metadata.outputs.version }}"
        echo "IMAGE_TAG=${{ needs.metadata.outputs.image_tag }}"
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Cleanup build resources (s390x only)
      if: matrix.arch == 's390x'
      shell: bash
      run: |
        echo "=== Disk before cleanup ==="
        df -h
        echo "=== Docker usage before cleanup ==="
        docker system df || true
        
        # Remove stopped containers
        docker container prune -f || true

        # Remove dangling images
        docker image prune -af || true

        # Remove unused volumes
        docker volume prune -f || true

        # Remove buildx cache
        docker builder prune -af || true
        docker buildx prune -af || true

        echo "=== Disk after cleanup ==="
        df -h
        echo "=== Docker usage after cleanup ==="
        docker system df || true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version-file: go.mod

    - name: Run pre-build command
      if: ${{ inputs.pre_build_command != '' }}
      run: ${{ inputs.pre_build_command }}

    - name: Log in to container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ secrets.registry-username || github.actor }}
        password: ${{ secrets.registry-password || secrets.GITHUB_TOKEN }}
    
    - name: Build and push multi-arch image
      uses: docker/build-push-action@v6
      with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ inputs.registry }}/${{ inputs.image_name }}:${{ needs.metadata.outputs.image_tag }}-${{ matrix.arch }}
    - name: Summary
      run: |
        echo "## Build Image Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ needs.metadata.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Image Tag**: ${{ inputs.registry }}/${{ inputs.image_name }}:${{ needs.metadata.outputs.image_tag }}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
    - name: Cleanup after build
      if: always() && matrix.arch == 's390x'
      run: |
        docker builder prune -af || true
        docker buildx prune -af || true
  manifest:
    needs:
      - metadata
      - build-image

    runs-on: ${{ inputs.runner }}

    steps:
    - name: Log in to container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ secrets.registry-username || github.actor }}
        password: ${{ secrets.registry-password || secrets.GITHUB_TOKEN }}
        
    - name: Create and push multi-arch manifest
      shell: bash
      run: |
        docker buildx imagetools create \
        -t ${{ inputs.registry }}/${{ inputs.image_name }}:${{ needs.metadata.outputs.image_tag }} \
        ${{ inputs.registry }}/${{ inputs.image_name }}:${{ needs.metadata.outputs.image_tag }}-amd64 \
        ${{ inputs.registry }}/${{ inputs.image_name }}:${{ needs.metadata.outputs.image_tag }}-s390x

    - name: Inspect manifest
      run: |
        docker buildx imagetools inspect \
        ${{ inputs.registry }}/${{ inputs.image_name }}:${{ needs.metadata.outputs.image_tag }}
